<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bomb Party Bot Control Panel</title>
</head>
<body>
    <div id="blockingOverlay" style="display: none;">Executing Action... Please Wait...</div>
    <h1>Bomb Party Bot Control Panel</h1>

    <form id="testForm">
        <label>Username: <input type="text" id="username" placeholder="Enter your username (or leave blank for random)"></label><br><br>
        <label>Room Code: <input type="text" id="roomcode" required placeholder="Enter your room code (e.g., ABCD)"></label><br><br>

        <label>Select Mode:
            <select id="selectMode">
                <option value="long">Long</option>
                <option value="short">Short</option>
                <option value="sneaky">Sneaky</option>
                <option value="regen">Regen</option>
                <option value="average">Average</option>
                <option value="common">Common</option>
            </select>
        </label><br><br>


        <button type="submit" id="launchBtn">Launch Bot</button>
        <button type="button" id="stopBtn" style="display: none; background-color: red; color: white; padding: 10px; margin-left: 10px;">Stop Bot</button>
    <script>
        const overlay = document.getElementById('blockingOverlay');
        const launchBtn = document.getElementById('launchBtn');
        const stopBtn = document.getElementById('stopBtn');

        //Start a persistent heartbeat loop to let Python know we are still here
        setInterval(() => {
            fetch('/api/heartbeat', { method: 'POST' }).catch(() => {});
        }, 2000);

        //Fetch current settings from the backend when the page loads
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();

                // If settings exist, auto-fill our basic inputs
                if (settings) {
                    if (settings.selectMode) document.getElementById('selectMode').value = settings.selectMode;
                }
                console.log("Settings successfully loaded into page.");
            } catch (err) {
                console.error("Could not load current settings:", err);
            }
        });

        //Intercept form submission and send to your Flask server
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            e.stopImmediatePropagation()

            launchBtn.style.display = 'none';
            overlay.style.display = 'flex';
            const payload = {
                username: document.getElementById('username').value,
                roomcode: document.getElementById('roomcode').value,
                invalid:[],
                dictionaries:[],
                proxies:[],
                selectMode: document.getElementById('selectMode').value,
                regenIfNeeded:true,
                sneakyRegen:true,
                stockpile:false,
                greedLong:false,
                timeConstraint:true,
                cyberbullying:false,
                mistakes:true,
                burstType:true,
                spamType:true,
                dynamicRate:false,
                dynamicPauses:true,
                dynamicMistakes:true,
                minWait:1.0,
                maxWait:3.2,
                mistakePause:0.100,
                miniPause: 0.330,
                minWpm:70,
                maxWpm:120,
                spamWpm:1000,
                burstChance:0.50,
                minMistakeChance:0.01,
                maxMistakeChance:0.15,
                spamChance:0.10,
                jitterPercent: 0.50
            };

            try {
                const response = await fetch('/api/launch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (result.success) {
                    // Update layout to state running configurations
                    launchBtn.style.display = 'none';
                    stopBtn.style.display = 'inline-block';
                } else {
                    alert("Error: " + result.error);
                    launchBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                }
            } catch (err) {
                alert("Failed to connect to the backend server.");
                launchBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            } finally {
                // UNBLOCK UI: Release form interactions regardless of success state
                overlay.style.display = 'none';
            }
        });

        document.getElementById('stopBtn').addEventListener('click', async function() {
            stopBtn.style.display = 'none';
            overlay.style.display = 'flex';
            try {
                const response = await fetch('/api/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const result = await response.json();
                if (result.success) {
                    // Update layout to state stopped configurations
                    launchBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                } else {
                    alert("Error: " + result.error);
                    launchBtn.style.display = 'none';
                    stopBtn.style.display = 'inline-block';
                }
            } catch (err) {
                alert("Failed to connect to the backend server.");
                launchBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            } finally {
                // UNBLOCK UI: Release form interactions regardless of success state
                overlay.style.display = 'none';
            }
        });
    </script>

</body>
</html>
